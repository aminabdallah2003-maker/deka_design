<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — DEKA DESIGN</title>
<link rel="stylesheet" href="../assets/css/global.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg-primary: var(--ink);
    --bg-secondary: #fff;
    --text-primary: var(--ink);
    --text-secondary: var(--text-muted);
    --border-color: var(--border);
    --logo-text: rgba(255,255,255,0.35);
  }

  body.light-mode {
    --bg-primary: #f5f5f5;
    --bg-secondary: var(--ink);
    --text-primary: var(--ink);
    --text-secondary: rgba(15,14,12,0.6);
    --border-color: rgba(15,14,12,0.15);
    --logo-text: rgba(15,14,12,0.5);
  }

  body { background: var(--bg-primary); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; transition: background 0.3s; }

  .inscription-wrap {
    width: 100%; max-width: 520px;
  }

  /* Logo centré */
  .inscription-logo {
    text-align: center; margin-bottom: 2rem;
  }
  .inscription-logo img {
    width: 70px; height: 70px; border-radius: 50%;
    object-fit: cover; border: 3px solid rgba(201,168,76,0.5);
    margin-bottom: 1rem;
  }
  .inscription-logo .name {
    font-family: 'Poppins', sans-serif; font-size: 1.4rem;
    font-weight: 800; color: var(--gold);
    letter-spacing: 0.06em;
  }
  .inscription-logo .sub {
    font-size: 0.75rem; color: var(--logo-text);
    letter-spacing: 0.12em; text-transform: uppercase;
    transition: color 0.3s;
  }

  /* Card inscription */
  .inscription-card {
    background: var(--bg-secondary); border-radius: 20px;
    padding: 2.5rem 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .inscription-card h2 {
    font-family: 'Poppins', sans-serif; font-size: 1.3rem;
    font-weight: 800; margin-bottom: 0.3rem; color: var(--text-primary);
    transition: color 0.3s;
  }
  .inscription-card .sub { 
    font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1.8rem;
    transition: color 0.3s;
  }

  /* Messages */
  .inscription-success {
    background: var(--success-bg); color: var(--success);
    border-radius: 10px; padding: 10px 14px;
    font-size: 0.82rem; margin-bottom: 1rem; display: none;
  }
  .inscription-success.show { display: flex; align-items: center; gap: 8px; }

  .inscription-error {
    background: var(--danger-bg); color: var(--danger);
    border-radius: 10px; padding: 10px 14px;
    font-size: 0.82rem; margin-bottom: 1rem; display: none;
  }
  .inscription-error.show { display: flex; align-items: center; gap: 8px; }

  /* Input wrapper avec icône */
  .input-wrap { position: relative; margin-bottom: 1rem; }
  .input-wrap i {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-secondary); font-size: 0.85rem; z-index: 1;
    pointer-events: none;
    transition: color 0.3s;
  }
  .input-wrap .form-input { 
    padding-left: 36px;
    padding-right: 36px;
    background: var(--bg-primary);
    color: var(--text-primary);
    border-color: var(--border-color);
    transition: background 0.3s, color 0.3s, border-color 0.3s;
  }
  body.light-mode .input-wrap .form-input {
    background: #fff;
  }
  .input-wrap .toggle-pwd {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-secondary); font-size: 0.85rem; z-index: 2;
    padding: 4px 8px;
    transition: color 0.3s;
  }
  .input-wrap .toggle-pwd:hover { color: var(--text-primary); }

  /* Groupe d'inputs côte à côte */
  .input-group {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;
  }
  .input-group .input-wrap { margin-bottom: 0; }

  /* Checkbox */
  .checkbox-wrap {
    display: flex; align-items: flex-start; gap: 8px;
    margin: 1.2rem 0 1.5rem;
  }
  .checkbox-wrap input[type="checkbox"] {
    width: 18px; height: 18px; margin-top: 3px;
    cursor: pointer; accent-color: var(--gold);
  }
  .checkbox-wrap label {
    font-size: 0.82rem; color: var(--text-secondary);
    cursor: pointer; line-height: 1.5;
    transition: color 0.3s;
  }
  .checkbox-wrap label a {
    color: var(--gold); text-decoration: none; font-weight: 600;
  }
  .checkbox-wrap label a:hover { text-decoration: underline; }

  /* Bouton submit */
  .btn-submit {
    width: 100%; padding: 12px; border-radius: 10px;
    background: var(--gold); color: var(--text-primary);
    border: none; font-family: 'Poppins', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    margin-bottom: 1rem;
  }
  .btn-submit:hover { background: var(--gold-dark); color: #fff; }
  .btn-submit:active { transform: scale(0.98); }

  /* Lien de connexion */
  .inscription-footer {
    text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.2rem;
    font-size: 0.85rem; color: var(--text-secondary);
    transition: border-color 0.3s, color 0.3s;
  }
  .inscription-footer a {
    color: var(--gold); font-weight: 600; text-decoration: none;
  }
  .inscription-footer a:hover { text-decoration: underline; }

  /* Force password */
  .pwd-strength {
    display: flex; gap: 4px; margin-top: 6px;
  }
  .pwd-bar {
    flex: 1; height: 4px; border-radius: 2px;
    background: var(--border-color); transition: all 0.2s;
  }
  .pwd-text {
    font-size: 0.7rem; margin-top: 4px; font-weight: 600;
  }

  /* Toggle thème */
  .theme-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 1000;
  }
  .theme-toggle button {
    width: 50px; height: 50px; border-radius: 50%;
    border: 2px solid var(--gold);
    background: var(--bg-secondary);
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  .theme-toggle button:hover {
    background: var(--gold);
    color: var(--bg-secondary);
    transform: scale(1.1);
  }

  /* Responsive */
  @media (max-width: 640px) {
    .inscription-card { padding: 2rem 1.5rem; }
    .input-group { grid-template-columns: 1fr; }
    .theme-toggle { top: 10px; right: 10px; }
    .theme-toggle button { width: 45px; height: 45px; font-size: 1rem; }
  }
</style>
</head>
<body>
  <!-- Toggle thème -->
  <div class="theme-toggle">
    <button id="themeToggleBtn" title="Changer de thème" onclick="toggleTheme()">
      <i class="fas fa-moon"></i>
    </button>
  </div>

  <div class="inscription-wrap">
    <!-- Logo -->
    <div class="inscription-logo">
      <img src="../assets/images/logo.png" alt="DEKA DESIGN">
      <div class="name">DEKA DESIGN</div>
      <div class="sub">Studio Créatif</div>
    </div>

    <!-- Carte d'inscription -->
    <div class="inscription-card">
      <h2>Créer un compte</h2>
      <p class="sub">Rejoignez la communauté DEKA DESIGN</p>

      <!-- Messages -->
      <div class="inscription-success" id="successMsg">
        <i class="fas fa-check-circle"></i>
        <span>Inscription réussie ! Vous pouvez maintenant vous connecter.</span>
      </div>
      <div class="inscription-error" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText">Une erreur est survenue. Veuillez réessayer.</span>
      </div>

      <!-- Formulaire -->
      <form id="inscriptionForm">
        <!-- Nom et Prénom -->
        <div class="input-group">
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input 
              type="text" 
              class="form-input" 
              id="firstName" 
              placeholder="Prénom"
              required
            >
          </div>
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input 
              type="text" 
              class="form-input" 
              id="lastName" 
              placeholder="Nom"
              required
            >
          </div>
        </div>

        <!-- Email -->
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input 
            type="email" 
            class="form-input" 
            id="email" 
            placeholder="Adresse e-mail"
            required
          >
        </div>

        <!-- Téléphone -->
        <div class="input-wrap">
          <i class="fas fa-phone"></i>
          <input 
            type="tel" 
            class="form-input" 
            id="phone" 
            placeholder="Numéro de téléphone"
            pattern="[0-9+\-\s]+"
          >
        </div>

        <!-- Entreprise -->
        <div class="input-wrap">
          <i class="fas fa-briefcase"></i>
          <input 
            type="text" 
            class="form-input" 
            id="company" 
            placeholder="Entreprise (optionnel)"
          >
        </div>

        <!-- Mot de passe -->
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input 
            type="password" 
            class="form-input" 
            id="password" 
            placeholder="Mot de passe"
            required
          >
          <button type="button" class="toggle-pwd" id="togglePwd">
            <i class="fas fa-eye"></i>
          </button>
          <div class="pwd-strength" id="pwdStrength" style="display:none;">
            <div class="pwd-bar" id="bar1"></div>
            <div class="pwd-bar" id="bar2"></div>
            <div class="pwd-bar" id="bar3"></div>
          </div>
          <div class="pwd-text" id="pwdText" style="color:var(--text-muted); display:none;"></div>
        </div>

        <!-- Confirmation mot de passe -->
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input 
            type="password" 
            class="form-input" 
            id="confirmPassword" 
            placeholder="Confirmer le mot de passe"
            required
          >
          <button type="button" class="toggle-pwd" id="toggleConfirmPwd">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <!-- Conditions d'utilisation -->
        <div class="checkbox-wrap">
          <input 
            type="checkbox" 
            id="acceptTerms" 
            required
          >
          <label for="acceptTerms">
            J'accepte les <a href="#" target="_blank">conditions d'utilisation</a> et la <a href="#" target="_blank">politique de confidentialité</a>
          </label>
        </div>

        <!-- Newsletter -->
        <div class="checkbox-wrap">
          <input 
            type="checkbox" 
            id="newsletter" 
            checked
          >
          <label for="newsletter">
            Recevoir des informations sur nos projets et actualités
          </label>
        </div>

        <!-- Bouton soumettre -->
        <button type="submit" class="btn-submit">
          <i class="fas fa-check" style="margin-right:6px;"></i>
          Créer mon compte
        </button>
      </form>

      <!-- Pied de page -->
      <div class="inscription-footer">
        Vous avez déjà un compte ? 
        <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    const form = document.getElementById('inscriptionForm');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const togglePwd = document.getElementById('togglePwd');
    const toggleConfirmPwd = document.getElementById('toggleConfirmPwd');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const pwdStrength = document.getElementById('pwdStrength');
    const pwdText = document.getElementById('pwdText');
    const acceptTerms = document.getElementById('acceptTerms');

    // Afficher/masquer le mot de passe
    togglePwd.addEventListener('click', (e) => {
      e.preventDefault();
      const icon = togglePwd.querySelector('i');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });

    toggleConfirmPwd.addEventListener('click', (e) => {
      e.preventDefault();
      const icon = toggleConfirmPwd.querySelector('i');
      if (confirmPasswordInput.type === 'password') {
        confirmPasswordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        confirmPasswordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });

    // Vérifier la force du mot de passe
    function checkPasswordStrength(pwd) {
      let strength = 0;
      const bars = [
        document.getElementById('bar1'),
        document.getElementById('bar2'),
        document.getElementById('bar3')
      ];

      if (pwd.length >= 8) strength++;
      if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) strength++;
      if (/[0-9]/.test(pwd) || /[!@#$%^&*]/.test(pwd)) strength++;

      bars.forEach((bar, i) => {
        if (i < strength) {
          bar.style.background = strength === 1 ? '#f39c12' : strength === 2 ? '#3498db' : '#27ae60';
        } else {
          bar.style.background = 'var(--surface2)';
        }
      });

      const texts = ['Faible', 'Moyen', 'Fort'];
      const colors = ['#f39c12', '#3498db', '#27ae60'];
      pwdText.textContent = texts[strength - 1] || '';
      pwdText.style.color = colors[strength - 1] || 'var(--text-muted)';

      return strength >= 2;
    }

    passwordInput.addEventListener('input', (e) => {
      pwdStrength.style.display = e.target.value ? 'flex' : 'none';
      pwdText.style.display = e.target.value ? 'block' : 'none';
      if (e.target.value) checkPasswordStrength(e.target.value);
    });

    // Validation et soumission
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      successMsg.classList.remove('show');
      errorMsg.classList.remove('show');

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      // Validations
      if (!firstName || !lastName) {
        errorText.textContent = 'Veuillez entrer votre nom et prénom.';
        errorMsg.classList.add('show');
        return;
      }

      if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
        errorText.textContent = 'Veuillez entrer une adresse e-mail valide.';
        errorMsg.classList.add('show');
        return;
      }

      if (password.length < 8) {
        errorText.textContent = 'Le mot de passe doit avoir au moins 8 caractères.';
        errorMsg.classList.add('show');
        return;
      }

      if (password !== confirmPassword) {
        errorText.textContent = 'Les mots de passe ne correspondent pas.';
        errorMsg.classList.add('show');
        return;
      }

      if (!acceptTerms.checked) {
        errorText.textContent = 'Vous devez accepter les conditions d\'utilisation.';
        errorMsg.classList.add('show');
        return;
      }

      // Si tout est valide
      console.log({
        firstName,
        lastName,
        email,
        phone: document.getElementById('phone').value,
        company: document.getElementById('company').value,
        newsletter: document.getElementById('newsletter').checked
      });

      successMsg.classList.add('show');
      form.reset();
      pwdStrength.style.display = 'none';
      pwdText.style.display = 'none';

      setTimeout(() => {
        // window.location.href = 'espace-client.html';
      }, 2000);
    });
  </script>
  <!-- Script de gestion du thème global -->
  <script src="../assets/js/theme.js"></script>
</body>
</html>
